body:
  text: 冷齊夜話卷五宋釋惠洪撰賭輸梅詩罰松聲詩王文公居鍾山嘗與薛處士棋賭梅詩輸一首曰華髮尋香始見梅一枝臨路雪培堆鳯城南陌他年憶杳杳難隨驛使來又嘗與俞秀老至報寧公方假寐秀老私跨驢入法雲謁寶覺禪師公知之有頃秀老至公佯作睡起遣秀老下階曰為僧子乃敢盜跨吾驢秀老叩頭願有以自贖其罪寺僧亦為之解勸公徐曰罰松聲詩一首秀老立就其詞極佳山中人忘之豫為補曰萬壑搖蒼烟百灘渡流水下有跨驢人蕭蕭吹醉耳東坡藏記舒王在鍾山有客自黃州來公曰東坡近日有何妙語客曰東坡宿于臨臯亭醉夢而起作成都聖像藏記千有餘言㸃定才一兩字有寫本適留舟中公遣人取而至時月出東南林影在地公展讀于風簷喜見眉鬚曰子瞻人中龍也然有一字未穩客曰願聞之公曰日勝日貧不若曰如人善博日勝日負耳東坡聞之拊手大笑亦以公為知言荆公梅詩荆公嘗訪一髙士不遇題其壁曰牆角數枝梅凌寒特地開遙知不是雪為有暗香來詩置動靜意荆公曰前輩詩云風定花猶落靜中見動意鳥鳴山更幽動中見靜意山谷曰此老論詩不失解經旨趣亦何怪耶唐詩有曰海日生殘夜江春入舊年者置早意于殘晚中有曰驚蟬移别栁鬭雀墮閒庭者置靜意于喧動中東坡作眉子研詩其略曰君不見長安畫手開十眉橫雲却月爭新竒遊人指㸃小顰處中有漁陽胡馬嘶用此微意也舒王山谷賦詩舒王宿金山寺賦詩一夕而成長句妙絶如曰天多剩得月月落聞歸鼓又曰乃知像教力但渡無所苦之類如生成山谷在星渚賦道士快軒詩㸃筆立成其略曰吟詩作賦北窗裏萬言不及一杯水願得青天化為一張紙想見其髙韻氣摩雲霄獨立萬象之表筆端三昧遊戲自在也王荆公詩用事舒王晚年詩曰紅梨無葉庇華身黃菊分香委路塵嵗晚蒼官才自保日髙青女尚橫陳又曰木落岡巒因自獻水歸洲渚得橫陳山谷謂豫曰自獻橫陳事見相如賦荆公不應用耳豫曰首楞嚴經亦曰於橫陳時味如嚼蠟蘇王警句唐詩有曰長因送人處憶得别家時又曰舊國别多日故人無少年荆公用其意作古今不經人道語荆公詩曰木末北山烟冉冉草根南澗水泠泠繅成白雪桑重緑割盡黃雲稻正青東坡曰桑疇雨過羅紈膩麥隴風來餅餌香如華嚴經舉因知果譬如蓮花方其吐華而果具蘂中句中眼造語之工至于荆公東坡山谷盡古今之變荆公曰江月轉空為白晝嶺雲分暝與黃昏又曰一水護田將緑繞兩山排闥送青來東坡海棠詩曰只恐夜深花睡去髙燒銀燭照紅妝又曰我攜此石歸袖中有東海山谷曰此皆謂之句中眼學者不知此妙語韻終不勝舒王編四家詩舒王以李太白杜少陵韓退之歐陽永叔詩編為四家詩集而以歐公居太白之上世莫曉其意舒王嘗曰太白詞語迅快無疏脫處然其識汚下詩詞十句九句言婦人酒耳歐公今代詩人未有出其右者但恨其不修三國志而修五代史耳如歐公詩曰行人仰頭飛鳥驚之句亦有佳趣第人不解耳范文正公蚊詩范仲淹少時求為秦州西溪監鹽其志欲吞西夏知用兵利病耳而廨舍多蚊蚋文正戲題其壁曰飽去櫻桃重饑來栁絮輕但知離此去不用問前程雖戲笑之語亦愷悌渾厚之氣逼人況其大者乎栁詩有竒趣栁子厚詩曰漁翁夜傍西巖宿曉汲清湘然楚竹烟消日出不見人􅀢音藹一聲山水緑回看天際下中流巖上無心雲相逐東坡云詩以竒趣為宗反常合道為趣熟味此詩有竒趣然其尾兩句雖不必亦可􅀢藹三老相呼聲也東坡屬對子遊儋耳及見黎民表為豫言東坡無日不相從乞園蔬出其臨别北渡時詩我本儋耳民寄生西蜀州忽然跨海去譬如事逺遊平生生死夢三者無劣優知君不再見欲去且少留其末云新醖佳甚求一具臨行寫此詩以折菜錢又登望海亭柱間有擘窠大字曰貪看白鳥橫秋浦不覺青林沒晚潮又謁姜唐佐唐佐不在見其母母迎笑食豫檳榔豫問母識蘇公否母曰識之然無奈其好吟詩公嘗杖而至指西壁木榻自坐其上問曰秀才何往我言入村落未還有包燈心紙公以手拭開書滿紙祝曰秀才歸當示之今尚在豫索讀之醉墨欹傾曰張睢陽生猶罵賊嚼齒穿齦顔平原死不忘君握拳透爪林和靖送遵式詩王冀公鎮金陵以書致錢塘講師遵式遵式以病辭及愈將謁公乃過孤山和靖先生林逋逋以詩送之曰虎牙熊軾隱鈴齊棠樹陰陰長碧苔丞相望崇賔謁少清談應喜道人來丁晉公和東坡詩韓子蒼曰丁晉公海外詩曰草解忘憂憂底事花能含笑笑何人世以為工讀東坡詩曰花非識面嘗含笑鳥不知名時自呼便覺才力相去如天淵上元詩豫自并州還江南過都下上元逢符寶郎蔡子因約相國寺未至有道人求詩且曰覺範嘗有寒巖寺詩懷京師曰上元獨宿寒巖寺卧看青燈映薄紗夜久雪猿啼嶽頂夢回山月上梅花十分春瘦緣何事一掬歸心未到家却憶少年行樂處軟風香霧噴東華今當為作京師上元懷山中也豫戲為之曰北遊爛熳看並山重到皇州及上元燈火樓臺思往事管絃音律試新翻期人未至情如海穿市歸來月滿軒却憶寒巖曾獨宿雪窗殘夜一聲猿東坡滑稽有村挍書年已七十方買妾饌客東坡杖藜相過村挍喜延坐其東起為壽且乞詩東坡問所買妾年幾何曰三十乃戲為詩其略曰侍者方當而立嵗先生已是古稀年此老滑稽故文章亦如此又曰世間事無有無對第人思之不至也如曰我見魏徵嘗嫵媚則對曰人言盧把是姦邪又曰無物不可比類如䗶花似石榴花紙花似罌宿花通草花似梨花羅絹花似海棠花冷齊夜話卷五
