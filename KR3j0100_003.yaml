body:
  text: 冷齊夜話卷三宋釋惠洪撰諸葛亮劉伶陶潜李令伯文如肺腑中流出李格非善論文章嘗曰諸葛孔明出師表劉伶酒德頌陶淵明歸去來辭李令伯陳情表皆沛然從肺腑中流出殊不見斧鑿痕是數君子在後漢之末兩晉之間初未嘗以文章名世而其意超邁如此吾是知文章以氣為主氣以誠為主故老杜謂之詩史者其大過人在誠實耳誠實著見學者多不曉如玉川子歸醉詩曰昨夜村飲歸健倒三四五摩挲青莓苔莫嗔驚著汝王荆公用其意作扇子詩曰玉斧修成寶月團月邊仍有女乘鸞青冥風露非人世鬢亂叉橫特地寒池塘生春草舒公云池塘生春草園桞變鳴禽之句謂有神助其妙意不可以言傳而古今文士多從而稱之謂之確論獨李元膺曰豫反覆觀此句未有過人處不知舒公何從見其妙蓋古今佳句在此一聮之上者尚多古之人意有所至則見于情詩句蓋其寓也謝公平生喜見惠連夢中得之蓋當論其情意不當泥其句也如謝東山喜見羊曇羊叔子喜見鄒湛王述喜見坦之皆其情意所至不可名狀特無詩句耳詩說煙波縹眇處豫自并州還故里館延福寺寺前有小溪風物類斜川豫兒童時戲劇處也嘗春深獨行溪上作小詩曰小溪倚春漲攘我釣月灣新晴為不平約束晚見還銀梭時撥刺破碎波中山整約背落中一葉軟紅間又嘗暮寒歸見白鳥作詩曰剩水殘山慘淡間白鷗無事釣舟閒箇中著我添圖畫便似華亭落照灣魯直謂豫曰觀君詩說煙波縹眇處如陸忠州論國政字字坦夷前身非篙師沙户種類耶有詩其略曰吾年六十子方半槁項螺巔度嵗年脫却衲衣著簔笠來佐涪翁刺釣船豫嘗對淵材誦之淵材曰此退之贈澄觀我欲收斂加冠巾換骨句也山谷集句貴拙速不貴巧遲集句詩山谷謂之百家衣體其法貴拙速而不貴巧遲如前輩曰晴湖勝鏡碧衰栁似金黃又曰事治閒景象摩挲白髭鬚又曰古瓦磨為硯閒砧坐當牀人以為巧然皆疲費精力積日月而後成不足貴也東坡美謫仙句語作讃曉披雲夢澤笠釣青茫茫又曰暮騎紫雲去海氣侵肌涼東坡曰此語非李太白不能道也嘗作贊曰天人幾何同一漚謫仙非謫乃其游揮斥八極隘九州化為兩鳥鳴相酬一鳴一止三千秋開元有道為少留縻之不可矧肯求西望太白橫峩岷眼髙四海空無人大兒汾陽中令君小兒天台坐忘身生平不識高將軍手汚吾足乃敢嗔作詩大笑君應聞韋蘇州寄全椒道人詩東坡曰羅浮有野人山中隱者或見之相傳葛稚川之𨽻也有鄧道士者嘗見其足蹟豫偶讀韋蘇州詩寄全椒道士云今朝郡齊冷忽念山中客澗底束荆薪歸來煮白石遙持一樽酒逺慰風雨夕落葉滿空山何處尋行蹟味其風度則全椒道士亦鄧君之流乎因以酒往問依蘇州韻作詩寄之曰一杯羅浮春逺餉採薇客遙知獨酌罷醉卧松下石幽人不可見清嘯聞月夕聊戲菴中人飛空本無蹟碁隱語舒王在鍾山有道士求謁因與棋輒作數語曰彼亦不敢先此亦不敢先惟其不敢先是以無所爭惟其無所爭故能入於不死不生舒王笑曰此特棋隱語也李元膺喪妻長短句許彥周曰李元膺作南京教官喪妻作長短句曰去年相逢深院宇海棠下曾歌金縷歌罷花如雨翠羅衫上㸃㸃紅無數今嵗重尋攜手處物是人非春莫回首青門路亂紅飛絮相逐東風去李元膺尋亦卒秦國大長公主挽詞秦國大長公主薨神考賜挽詞三首曰海濶三山路香輪定不歸帳深空翡翠珮冷失珠璣明月留歌扇殘霞散舞衣都門送車返宿草自春菲又曰曉發城西道靈車望更遙春風空魯館明月斷秦簫塵入羅衣暗香隨玉篆銷芳魂飛北渚那復可為招又曰慶自天源發恩從國愛申歌鐘雖在館桃李不成春水折空還沁樓髙已隔秦區區會稽市無復獻珠人元豐初臣魏泰載之于詩話中雖穆王黃竹漢髙大風之詞莫可擬其髣佛噫豈特前代帝王蓋古今詞章之工者無此作也荆公鍾山東坡餘杭詩山谷云天下清景初不擇賢愚而與之遇然吾特疑端為我輩設荆公在鍾山定林與客夜對偶作詩曰殘生傷性老耽書年少東來復起豫夜據槁梧同不寐偶然聞雨落階除東坡宿餘杭山寺贈僧曰暮鼓朝鐘自擊撞閉門欹枕有殘缸白灰旋撥通紅火卧聽蕭蕭雪打窗人以山谷之言為確論少游魯直被謫作詩少游調雷悽愴有詩曰南土四時都熱愁人日夜俱長安得此身如石一時忘了家鄉魯直謫宜殊坦夷作詩云老色日上面歡情日去心今既不如昔後當不如今輕紗一幅巾短簟六尺牀無客白日靜有風終夕涼少游鍾情故其詩酸楚魯直學道休歇故其詩閒暇至於東坡南中詩曰平生萬事足所缺惟一死則英特邁往之氣不受夢幻折困可畏而仰哉活人手假司馬溫公童稚時與羣兒戲于庭庭有大甕一兒登之偶墮甕水中羣兒皆棄去公則以石擊甕水因穴而迸兒得不死蓋其活人手假已見于齠齓中至今京洛間多為小兒擊甕圖詩未易識唐詩有竹徑通幽處禪房花木深之句歐陽文忠公愛之每以語客曰古人工為發端心雖曉之而才莫逮欲倣此為一聮終莫之能以文忠公之才而謂不能詩蓋未易識也冷齊夜話卷三
