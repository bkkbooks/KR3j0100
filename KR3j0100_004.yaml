body:
  text: 冷齋夜話卷四宋釋惠洪撰詩話妄易句法之病司馬溫公詩話曰魏野詩云燒葉爐中無宿火讀書窗下有殘燈而俗人易葉為藥不止不佳亦和下句無氣味魯直曰老杜詩云黃獨無苗山雪盛黃獨者芋魁小者耳江南名曰土卵兩川多食之而俗人易曰黃精子美流離亦未有道人劍客食黃精也如淵明曰採菊東籬下悠然見南山其渾成風味句法如生成而俗人易曰望南山一字之差遂失古人情狀學者不可不知也五言四句詩得于天趣吾弟超然喜論詩其為人純至有風味嘗曰陳叔寶絶無肺腸然詩語有警絶者如曰午醉醒來晚無人夢自驚夕陽如有意偏傍小窗明王維摩詰山中詩曰溪清白石出天寒紅葉稀山路元無雨空翠濕人衣舒王百家夜休曰相看不忍發慘淡暮潮平欲别更攜手月明洲渚生此皆得于天趣豫問之曰句法固佳然何以識其天趣超然曰能言蕭何所以識韓信則天趣可言豫竟不能詰歎曰微超然誰知之夢中作詩崇寧元年元日粥罷昏睡夢中忽作一詩既覺尚能記之曰無賴東風試怒號共乘一葉傲驚濤不知兩岸人皆愕但覺中流笑語髙三月七日偶與瑩中濟湘江是日大風當斷渡而瑩中必欲宿道林小舟掀舞向浪中兩岸聚觀膽落而瑩中笑聲愈髙豫紬繹夢中詩以語瑩中瑩中云此假公案三十年後大行叢林也西崑體詩到李義山謂之文章一厄以其用事僻澀時稱西崑體然荆公晚年亦或喜之而字字有根蒂如作雪詩曰借問火城將策探何如雲屋聽窗知又曰未愛京師傳谷口但知鄉里勝壺頭其用事琢句前輩無相犯者昔李師中作送唐介謫官詩曰去國一身輕似葉髙名千古重於山並遊英俊顔何厚未死姦諛骨已寒云云已而聞介赴月首上官李大敬以書索其詩唐公笑曰吾正不用此無寸馬落顔詩遂以還之李大敬久之乃悟一身千古非挾對與荆公措意異矣詩比美女美丈夫前輩作花詩多用美女比其狀如曰若教解語應傾國任是無情也動人誠然哉山谷作酴醿詩曰露濕何郎試湯餅日烘荀令炷爐香乃用美丈夫比之特若出類而吾叔淵材作海棠詩又不然曰雨過溫泉浴妃子露濃湯餅試何郎意尤工也道潛作詩追法淵明乃十四字師號道潛作詩追法淵明其語逼真處數聲柔櫓蒼茫外何處江村人夜歸又曰隔林倣佛聞機杼知有人家住翠微時從東坡在黃州京師士大夫以書抵坡曰聞公與詩僧相從真東山勝遊也坡以書示潛誦前句笑曰此吾師十四字師號耳元章瀑布詩米芾元章豪放戲謔有味士大夫多能言其作止有書名嘗大字書曰吾有瀑布詩古今賽不得最好是一條界破青山色人固以怪之其後題云蘇子瞻曰此是白樂天奴子詩見者莫不大笑詩句含蓄詩有句含蓄者如老杜曰勳業頻看鏡行藏獨倚樓鄭雲叟曰相看臨逺水獨自上孤舟是也有意含蓄者如宫詞曰銀燭秋光冷畫屏輕羅小扇撲流螢天街夜色涼於水卧看牽牛織女星又嘲人詩曰怪來妝閣閉朝下不相迎總向春園裏花間笑語聲是也有句意俱含蓄者如九日詩曰明年此會知誰健醉把茱萸子細看宫怨詩曰玉容不及寒鴉色猶帶朝陽日影來是也滿城風雨近重陽黃州潘大臨工詩多佳句然甚貧東坡山谷尤喜之臨川謝無逸以書問有新作否潘答書曰秋來景物件件是佳句恨為俗氛所蔽翳昨日間卧聞攪林風雨聲欣然起題其壁曰滿城風雨近重陽忽催租人至遂敗意止此一句奉寄聞者笑其迂濶天棘王仲正言老杜詩江蓮搖白羽天棘蔓青絲天棘非煙雨自是一種物曾見于一小説今忘之髙秀實曰天棘天門冬也一名顛棘非天棘也王元之詩曰水芝卧玉腕天棘舞金絲則天棘蓋栁也琥珀韋應物作琥珀詩曰曾為老茯苓元是寒松液蚊蚋落其中千年猶可覿舊説松液入地千年所化令燒之尚作松氣嘗見琥珀中有物如蜂然此物自外國來地有茯苓處皆無琥珀不知韋公何以知之詩誤字老杜詩曰白鷗沒浩蕩萬里誰能馴今誤作波浩蕩非唯無氣味亦分外間置波字舒王曰道人北山來問松我東岡舉手指屋脊云今如許長今誤作問松栽東岡與波浩蕩當併按也王荆公東坡詩之妙對句法詩人窮盡其變不過以事以意以出處具備謂之妙如荆公曰平昔離愁寬帶眼迄今歸思滿琴心又曰欲寄荒寒無善畫賴傳悲壯有能琴乃不若東坡徵意特竒如曰見説騎鯨遊汗漫亦曾捫蝨話辛酸又曰蠶市風光思故國馬行燈火記當年又曰龍驤萬斛不敢過漁舟一葉從掀舞以鯨為蝨對以龍驤為漁舟對小大氣熖之不等其意若玩世謂之秀傑之氣終不可沒者此類是也詩忌今人之詩例無精彩其氣奪也夫氣之奪人百種禁忌詩亦如之富貴中不得言貧賤事少壯中不得言衰老事康強中不得言疾病死亡事脫或犯之人謂之詩讖謂之無氣是大不然詩者妙觀逸想之所寓也豈可限以繩墨哉如王維作畫雪中芭蕉自法眼觀之知其神情寄寓于物俗論則譏以為不知寒暑荆公方大拜賀客盈門忽點墨書其壁曰霜筠雪竹鍾山寺投老歸歟寄此生坡在儋耳作詩曰平生萬事足所欠惟一死豈可與世俗論哉豫嘗與客論至此而客不然豫論豫作詩自志其略曰東坡醉墨浩琳琅千首空餘萬丈光雪裏芭蕉失寒暑眼中騏驥略玄黃云云詩言其用不言其名用事琢句妙在言其用不言其名耳此法唯荆公東坡山谷三老知之荆公曰含風鴨緑鱗鱗起弄日鵝黃裊裊垂此言水栁之用而不言水栁之名也東坡别子由詩猶勝相逢不相識形容變盡語音存此用事而不言其名也山谷曰管城子無食肉相孔方兄有絶交書又曰語言少味無阿堵氷雪相看有此君又曰眼見人情如格五心知世事等朝三格五今之蹙融是也後漢注云常置人于險處耳然句中眼者世尤不能解語言者蓋其德之候也故曰有德者必有言王荆公欲革歷世因循之弊以新王化作雪詩其略曰勢合便疑包地盡功成終欲放春回農家不驗豐年瑞秪欲青天萬里開賈島詩賈島詩有影略句韓退之喜之其渡桑乾詩曰客舍并州三十霜歸心日夜憶咸陽如今更渡桑乾水却望并州是故鄉又赴長江道中詩曰䇿杖馳山驛逢人問梓州長江那可到行客替生愁詩用方言句法欲老健有英氣當間用方俗言為妙如竒男子行人羣中自然有頴脫不可干之韻老杜八仙詩序李白曰天子呼來不上船方俗言也所謂襟紉是也家家養烏鬼頓頓食黃魚川峽路人家多供祀烏蠻鬼以臨江故頓頓食黃魚耳俗人不解便作養畜字讀遂使沈存中自差烏鬼為鸕鷀也夜闌更秉燭相對如夢寐更互秉燭照之恐尚是夢也作更字讀則失其意甚矣山谷每笑之如所謂一霎杜公雨數畨花信風之類是也江左風流久已零落士大夫人品不髙故竒韻滅絶東晉騷人勝士最多皆無出謝安石之右煙飛空翠之間乃攜娉婷登臨之與夫雪夜訪山陰故人興盡而返下馬據胡牀三弄而去者異矣舒王女能詩舒王女吳安持之妻蓬萊縣君工詩多佳句有詩寄舒王曰西風不入小窗紗秋氣應憐我憶家極目江山千里恨依然和淚看黃花舒王以楞嚴經新釋付之有和詩曰青燈一點映窗紗好讀楞嚴莫憶家能了諸緣如幻夢世間惟有妙蓮花冷齋夜話卷四
