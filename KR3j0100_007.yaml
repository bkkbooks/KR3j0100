body:
  text: 冷齊夜話卷七宋釋惠洪撰蘇軾襯朝道衣哲宗問右璫陳衍蘇軾襯朝章者何衣衍對曰是道衣哲宗笑之及謫英州雲居佛印遣書追至南昌東坡不復答書引紙大書曰戒和尚又錯脫也後七年復官歸自海南監玉局觀作偈戲答僧曰惡業相纒册八年常行八棒十三禪却著衲衣歸玉局自疑身是五通仙東坡廬山偈東坡遊廬山至東林作偈曰溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人般若了無剩語橫看成嶺側成峯逺近看山了不同不識廬山真面目只緣身在此山中魯直曰此老人于般若橫說竪說了無剩語非其筆端有舌安能吐此不傳之妙哉船子和尚偈華亭船子和尚偈曰千尺絲綸直下垂一波才動萬波隨夜靜水寒魚不食滿船空載月明歸叢林盛傳想見其為人宜州倚曲音成長短句曰一波才動萬波隨簔笠一鈎絲金鱗正在深處千尺也須垂吞又吐信還疑上鈎遲水寒江靜滿目青山載月明歸東坡和陶詩東坡在惠州盡和淵明詩時魯直在黔南聞之作偈曰子曕謫海南時宰欲殺之飽喫惠州飯細和淵明詩淵明千載人子瞻百世士出處固不同風味亦相似尋又遷儋耳久之天下盛傳子瞻已仙去矣後七年北歸時章丞相方貶雷州東坡至南昌太守云世傳端明已歸道山今尚爾遊戲人間耶東坡曰途中見章子厚乃回反耳東坡戲作偈語東坡自海南至䖍上以水涸不可舟逗留月餘時過慈雲寺浴長老明鑑魁梧如所畫慈恩然叢林以道學與之東坡作偈戲之曰居士無塵堪洗沐老師有句借宣揚窗間但見蠅鑽紙門外時聞佛放光遍界難藏真薄相一絲不掛且逢場却須重說圓通偈千眼薰籠是法王又嘗要劉器之同參玉版和尚器之每倦山行聞見玉版欣然從之至廉泉寺燒笋而食器之覺笋味勝問此笋何名東坡曰即玉版也此老師善說法要能令人得禪悅之味于是器之乃悟其戲為大笑東坡亦悅作偈曰叢林真百丈嗣法有橫枝不怕石頭路來參玉版師聊憑柏樹子與問籜龍兒瓦礫猶能說此君那不知東坡留戒公疏東坡鎮維揚幕下皆竒豪一日石塔長老遣侍者投牒求解院東坡問長老欲何往對曰歸西湖舊廬即令出别候指揮東坡于是將僚佐同至石塔令擊鼓大衆聚觀䄂中出疏使朝無咎讀之其詞曰大士何曾出世誰作金毛之聲衆生各自開堂何關石塔之事去無作相住亦隨緣戒公長老開不二門施無盡藏念西湖之久别亦是偶然為東坡而少留無不可者一時稽首重聽白槌渡口船回依舊雲山之色秋來雨過一新鐘鼓之聲謹疏豫謂戒公甚類杜子美黃四娘耳東坡妙觀逸想託之以為此文遂與百世俱傳也負華嚴入嶺及大雪偈陳瑩中謫合浦時豫在長沙以書抵豫為負華嚴入嶺有偈曰大士遊方興盡回家山風月絶塵埃杖頭多少閒田地挑取華嚴入嶺來豫和之曰因法相逢一笑開俯看人世過飛埃湘江廟外休分别常寂光中歸去來又聞嶺外大雪作二偈寄之曰傳聞嶺下雪壓倒千年樹老人拊手笑有眼未嘗覩故應潤物林一洗瘴江霧寄語牧牛人莫教頭角露又曰遍界不曾藏處處光皎皎開眼失却蹤都緣大分曉園林忽生春萬瓦粲一笑遙知忍凍人未悟安心了夢迎五祖戒禪師蘇子由初謫髙安時雲菴居洞山時時相過聰禪師者蜀人居聖壽寺一夕雲菴夢同子由聰出城迓五祖戒禪師既覺私怪之以語子由未卒聰至子由迎呼曰方與洞山老師說夢子來亦欲同說夢乎聰曰夜來輒夢見吾三人者同迎五戒和尚子由拊手大笑曰世間果有同夢者異哉良久東坡書至曰已次奉新旦夕可相見二人大喜追筍輿而出城至二十里建山寺而東坡至坐定無可言則各追繹向所夢以語坡坡曰軾年八九嵗時嘗夢其身是僧往來陜右又先妣方孕時夢一僧來託宿記其頎然而眇一目雲菴驚曰戒陜右人而失一目暮年棄五祖來游髙安終于大愚逆數蓋五十年而東坡時年四十九矣後東坡復以書抵雲菴其略曰戒和尚不識人嫌强顔復出真可笑矣既法契可痛加磨礪使還舊規不勝幸甚自是常衣衲衣張文定公前生為僧張文定公方平為滁州日游琅琊周行廊廡神觀清淨至藏院俯仰久之忽呼左右梯梁間得經一函開視之則楞伽經四卷餘其半未寫公因㸃筆續之筆蹟不異味經首四句曰世間相生滅猶如虛空花智不得有無而興大悲心遂大悟流涕見前世事蓋公前生嘗主藏于此病革自以寫經未終願再來成之故也公立朝正色自慶厯以來名臣為人主所敬者莫如公暮年出此經示東坡居士坡為重寫題公之名于其右刻于浮玉山龍游寺悅禪師作偈戲詵公雲峰悅禪師叢林敬畏為明眼尊宿與興化詵公友善詵城居三十餘年老矣猶迎送不已悅嘗誡曰公乃不袖手山林中去尚此忍垢乎郡僚愛詵多久不果一日送大官出郊墮馬損臂呻吟月餘以書哀訴于悅悅恨其不聽言作偈戲之曰大悲菩薩有千手大丈夫兒誰不有興化和尚折一支猶有九百九十九南華恭長老同嗣大愚然少叢林有書來敘法禮悅作偈戲之曰與師萍跡寄江湖共憶當年在大愚堪笑堪悲無限事甜瓜生得苦葫蘆觸背關寶覺禪師老庵于龍峰之北魯直丁家難相從甚久館于庵之旁兩年寶覺見學者必舉手示之曰喚作拳是觸不喚拳是背莫有契之者叢林謂之觸背關張丞相奉使江西日將造其廬至兜率見悅禪師遽甚稱其門人及見寶覺乃作偈曰久嚮黃龍山裏龍到來只見住山翁須知背觸拳頭外别有靈犀一㸃通靈源叟時為侍者乃作贊其略曰聞時富貴見後貧窮年老浩歌歸去樂從他人喚住山翁魯直大笑曰天覺所言靈犀一㸃此䖃苴為虛空安耳穴靈源作贊分雪之是寫一字不著畫毛僧說偈吳有異比丘號毛僧日遊聚落飲食無所擇輕薄子多狎玩之貴勢要之不詣忽謂人曰吾其死矣乃危坐說偈曰毛僧毛僧事事不能死了燒了却似不生言畢遽化嗟乎異哉其端師子戒闍梨之徒乎謝無逸佳句謝逸字無逸臨川人勝士也工詩能文黃魯直讀其詩曰朝張流也恨未識之耳無逸詩曰老鳯垂頭噤不語枯木槎牙噪春鳥又曰貪夫蟻旋磨冷官魚上竹又曰山寒石髮瘦水落溪毛凋為魯直所稱賞洪覺範朱世英二偈朱世英以德行薦于朝當入學意不欲行不得已詣之信宿而返所居一堂生涯如龎藴豫嘗過之少君方炊稚子宗野汲水而無逸誦書掃除顧見豫放帚大笑曰聊復爾耳豫作偈曰老妻營炊稚子汲水龎公掃除丹霞適至棄帚迎朋一笑相視不必靈照多說道理世英聞之亦作偈曰提籃靈照掃地謝公一般是麵做作不同不假語默通透玲瓏更若不會換手捶胸冷齊夜話卷七
