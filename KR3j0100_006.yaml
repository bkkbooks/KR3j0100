body:
  text: 冷齋夜話卷六宋釋惠洪撰曾子固諷舒王嗜佛舒王嗜佛書曾子固欲諷之未有以發之也居一日會于南昌少頃潘延之亦至延之談禪舒王問其所得子固熟視之已而又論人物曰某人可稱子固曰弇用老而逃佛亦可一稱舒王曰子固失言也善學者讀其書惟理之求有合吾心者則樵牧之言猶不廢言而無理周孔所不敢從子固笑曰前言第戲之耳稱甘露滅陳了翁罪豫不當稱甘露滅近不遜曰得甘露滅覺道成者如來識也子凡夫與僕輩俯仰其去佛地如天淵也奈何冒其美名而有之耶豫應之曰使我不得稱甘露滅者如言蜜不得稱甜金不得稱色黃世尊以大方便曉諸衆生令知根本而妙意不可以言盡故言甘露滅滅者寂滅甘露不死之藥如寂滅之體而不死者也人人具焉而獨僕不得稱何也公今間放且不肯以甘露滅名我脫為宰相寧能飾豫以美官乎瑩中愕然思所為折難豫不可得乃笑而已大覺禪師乞還山大覺璉禪師學外工詩舒王少與遊嘗以其詩示歐公歐公曰此道人作肝臟饅頭也舒王不悟其戲問其意歐公曰是中無一點菜氣璉蒙仁廟賞識留住東京淨因禪院甚久嘗作偈進呈乞還山林曰千簇雲山萬壑流間身歸老此峰頭殷勤願祝如天壽一炷清香滿石樓又曰堯仁況是如天濶乞與孤雲自在飛靚禪師溺流詩靚禪師有道老宿也主筠之三峰嘗赴供民家渡溪漲靚重遲為溪流所陷童子掖至岸坐沙石間垂頭如雨中鶴童子意必怒且遭斥逐不敢仰視靚忽指溪作詩曰春天一夜雨雱𩃱添得溪流意氣多剛把山僧推倒却不知到海後如何靚後往汝州香山無疾而化靚禪師化人題壁三峰靚禪師初住寶雲邑有巨商尚氣不受僧化曰施由我耳豈容人勸靚宣言唯吾獨能化之其人聞靚至果不出靚題其壁而去曰去年巢穴畫梁邊春暖雙雙繞檻前莫訝主人簾不捲恐銜泥土汚花磚其人喜不怒特自追還厚施之靚笑謂人曰吾果能化之誦智覺禪師詩智覺禪師住雪竇之中嵓嘗作詩曰孤猿呌落中嵓月野客吟殘半夜燈此境此時誰得意白雲深處坐禪僧詩語未工而其氣韻無一點塵埃豫嘗客新吳車輪峰之下曉起臨髙閣窺殘月聞猿聲誦此句大笑栖鳥驚飛又嘗自朱崖下瓊山渡藤橋千萬峰之間聞其聲類車輪峰下時而一笑不可得也但覺此時字字是愁耳老杜詩曰感時花濺淚恨别鳥驚心良然真佳句也親證其事然後知其義永庵嗣法南禪鄧峰永庵主南禪師子也未嘗問法南禪公所至輒隨之魯直聞其風而悅之眼不及識有自慶者事永甚久即以慶主黃龍宜州為作疏語特竒峻叢林於慶改觀又見之與語多解休又嗣法南公宜州過永舊庵題其壁曰奪得蕃兒馬便休休嗟李廣不封侯當時射殺南山虎子細看來是石頭東坡和惠詮詩東吳僧惠詮佯狂垢汚而詩句清婉嘗書湖上一山寺壁曰落日寒蟬鳴獨歸林下寺柴扉夜未掩片月隨行屨唯聞犬吠聲又入青蘿去東坡一見為和于後曰唯聞煙外鐘不見煙中寺幽人夜未寢草露濕芒屨象外句唐僧多佳句其琢句法比物以意而不指言某物謂之象外句如無可上人詩曰聽雨寒更盡開門落葉深是以落葉比雨聲也又曰微陽下喬木逺燒入秋山是以微陽比逺燒也僧清順十竹林下詩西湖僧清順怡然清苦多佳句嘗賦十竹詩云城中寸土如寸金幽軒種竹只十個春風慎勿長兒孫穿我階前緑苔破又有林下詩曰久從林下遊頗識林下趣縱渠緑陰繁不礙清風度間來石上眠落葉不知數一鳥忽飛來啼破幽寂處荆公遊湖上愛之稱揚其名坡晚年亦與之遊亦多唱酬東坡稱賞道潛詩東吳僧道潛有標致嘗自姑蘇歸湖上經臨平作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲坡一見如舊及坡移守東徐潛往訪之館于逍遙堂士大夫爭欲識面東坡饌客罷與俱來而紅妝擁隨之東坡遣一妓前乞詩潛援筆而成曰寄語巫山窈窕娘好將魂夢惱襄王禪心已作沾泥絮不逐春風上下狂一座大驚自是名聞海內然性偏尚氣憎兄子如仇嘗作詩云去嵗東風上苑行爛窺紅紫厭平生如今眼底無姚魏浪蘂浮花懶問名士論以此少之僧景淳詩多深意桂林僧景淳工為五言詩規模清寒其淵源出于島可時有佳句元豐之初南國山林人多傳誦居豫章乾明寺終日閉門不置侍者一室淡然聞鄰寺齋鐘即造焉坐同海衆食堂前飯罷徑去諸剎皆敬愛之見其至則為設鉢其或陰雨則諸剎為送食住二十年如一日四時不出謂大風雨極寒熱時景福老衲為豫言淳詩意苦而深世不可遽解如曰夜色中旬後虛堂坐幾更臨溪猿不呌當檻月初生又曰後夜客來稀幽齋獨掩扉月中無旁立草際一螢飛有深意豫時方十六七心不然之然聞清修自守是道人活計喜之耳鐘山賦詩余居鍾山最久超然山水間夢亦成趣嘗乘佳月登上方深入定林夜卧松下石上四更自寶公塔路還合妙齋月昃虛幌淨几兀然童僕憨寢甫鼾憑前檻無所見時有流螢穿户牖風露浩然松聲滿院作詩曰雨過東南月亮清意行深入碧蘿層露眠不管牛羊踐我是鍾山無事僧又曰未饒拄杖挑山衲差勝袈裟裹草鞋吹面谷風衝過虎歸來風雨撼空齋僧可遵好題詩福州僧可遵好作詩暴所長以蓋人叢林貌禮之而心不然嘗題詩湯泉壁間東坡遊廬山偶見為和之遵曰禪庭誰立石龍頭龍口湯泉沸不休直待衆生塵垢盡我方清冷混常流東坡曰石龍有口口無根龍口湯泉自吐吞若信衆生本無垢此泉何處覓寒溫遵自是愈自矜伐客金陵佛印元公自京師還過焉遵作詩贈之曰上國歸來路幾千渾身猶帶御爐煙鳯凰山下敲篷咏驚起山翁白晝眠元戲答曰打睡禪和萬萬千夢中趍利走如煙勸君打快修禪定老境如蠶已再眠元詩雖少藴藉然一時快之冷齋夜話卷六
