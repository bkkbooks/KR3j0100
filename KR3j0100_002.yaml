body:
  text: 冷齊夜話卷二宋釋惠洪撰韓歐范蘇嗜詩韓魏公罷政判北京作園中行詩風定曉枝蝴蝶鬧雨勻春圃桔橰閒又嘗謂意趣所見多見于嗜好歐陽文忠喜士為天下第一嘗好誦孔北海坐上客常滿樽中酒不空范文正公清嚴而喜論兵嘗好誦韋蘇州詩兵衛森畫㦸燕寢凝清香東坡友愛子由而性嗜清境每誦何時風雨夜復此對牀眠山谷寄傲士林而意趣不忘江湖其作詩曰九陌黃塵烏帽底五湖春水白鷗前又曰九衢塵土烏靴底想見滄洲白鳥雙又曰夢作白鷗去江湖水貼天又作演雅詩曰江南野水碧於天中有白鷗似我閒陳無已挽詩豫問山谷今之詩人誰為冠曰無出陳師道無已問其佳句如何曰吾見其作溫公挽詞一聮便知其才不可敵曰政雖隨日化身已要人扶洪駒父評詩之誤洪駒父曰桞子厚詩曰􅀢靄一聲山水緑􅀢音奧而世俗乃分􅀢為二字誤矣如老杜詩曰雨腳泥滑滑世俗為兩腳泥滑滑王元之詩曰春殘葉密花枝少睡起茶親酒盞疏世以為睡起茶多酒盞疏多此類留食戲語大笑噴飯豫與李德修游公義過一新貴人貴人留食豫三人者皆以左手舉箸貴人曰公等皆左轉也豫遂應聲曰我輩自應須左轉知君豈是背匙人一座大笑噴飯滿案歐陽黃牛廟東坡錢塘詩歐陽公黃牛廟詩曰石馬繫祠門東坡錢塘詩曰我識南屏金鯽魚二句皆似童稚語然皆記一時之事歐陽嘗夢至一神祠祠有石馬缺左耳及謫夷陵過黃牛廟所見如夢西湖南屏山興教寺池有鯽十餘尾金色道人齊餘爭倚檻投餅餌為戲東坡習西湖久故寓于詩詞耳古樂府前輩多用其句豫嘗館州南客邸見所謂嘗賣者破篋中有詩編寫本字多漫滅皆晉簡文帝時名公卿而詩語工甚有古意樂府曰繡幕圍香風耳節朱絲桐不知理何事淺立經營中護惜加窮袴隄防託守宫今日牛羊上丘壠當時近前靣發紅云云前輩多全用其句老杜曰意象慘淡經營中李長吉曰羅幃繡幕圍春風山谷曰牛羊今日上丘壠當時近前左右瞋豫見魯直未得此書窮袴漢時語也今襠袴是也雷轟薦福碑范文正公鎮鄱陽有書生獻詩甚工文正禮之書生自言天下之至寒餓者無在某右時盛行歐陽率更書薦福寺碑墨本直千錢文正為具紙墨打千本使售于京師紙墨已具一夕雷擊碎其碑故時人為之語曰有客打碑來薦福無人騎鶴上揚州東坡作窮措大詩曰一夕雷轟薦福碑立春王禹玉口占一絶歐公王禹玉俱在翰苑立春日當進詩貼子㑹溫成皇后薨閣虛不進有旨亦令進歐公經營中禹玉口占便寫曰昔聞海上有三山煙鎖樓臺日月閒花似玉容長不老只應春色勝人間歐公喜其敏速禹玉歐公門生也而同局近世盛事其詩略曰當年叨入武成宫曾看揮毫氣吐虹夢寐閒思十年事笑談今此一樽同喜君新賜黃金帶顧我今為白髮翁云云稚子老杜詩曰竹根稚子無人見沙上鳬雛並母眠世或不解稚子無人見何等語唐人食笋詩曰稚子脫錦䙀駢頭玉香滑則稚子為笋明矣贊寧雜志曰竹根有鼠大如猫其色類竹名竹豚亦名稚子豫問韓子蒼子蒼曰笋名稚子老杜之意也不用食笋詩亦可耳老杜劉禹錫白居易詩言妃子死老杜北征詩曰唯昔艱難初事與前世别不聞夏商衰終自誅褒妲意者明皇鑒夏商之敗畏天悔過賜妃子死也而劉禹錫馬嵬詩曰官軍誅佞幸天子舍夭姬羣吏伏門屏貴人牽帝衣白樂天長恨詞曰六軍不發爭奈何宛轉蛾眉馬前死乃是官軍迫使殺妃子歌詠祿山叛逆耳孰謂劉白能詩哉其去老杜何啻九牛毛耶北征詩識君臣之大體忠義之氣與秋色爭髙可貴也館中夜談韓退之詩沈存中呂惠卿吉甫王存正仲李常公擇治平中在館中夜談詩存中曰退之詩押韻之文耳雖健美富贍然終不是詩吉甫曰詩正當如是吾謂詩人亦未有如退之者正仲是存中公擇是吉甫於是四人者相交攻久不决公擇正色謂正仲曰君子羣而不黨公獨黨存中正仲怒曰我所見如此偶因存中便謂之黨則君非黨吉甫乎一坐大笑豫嘗熟味退之詩真出自然其用事深密髙出老杜之上如符讀書城南詩少長聚嬉戲不殊同隊魚又腦脂蓋眼卧壯士大招挂壁何由彎皆自然也襄陽魏泰曰韓退之詩曰剝苔吊斑林角黍餌沈塜竹非墨㸃之斑也楚竹初生蘚封之土人斫之浸水中洗去蘚故蘚痕成紫暈耳昭州崇寧寺觀音竹永州淡山狐鄒志完南遷自號道鄉居士在昭州江上為居室近崇寧寺因閲華嚴經于觀音像前有修竹三根生像之後志完揭茅出之不可乃垂枝覆像有如今世畫寶陀山巖竹今猶在昭人扄鎖之以俟過客遊觀比還過永州淡山岩岩有馴狐凡貴客至則鳴志完將至而狐輒鳴寺僧出迎志完怪之僧以狐鳴為對志完作詩曰我入幽岩亦偶然初無消息與人傳馴狐戲學仙伽客一夜飛鳴報老禪僧賦蒸豚詩王中令既平蜀捕逐餘寇與部隊相逺饑甚入一村寺中主僧醉甚箕踞公怒欲斬之僧應對不懼公竒而赦之問求蔬食僧曰有肉無蔬公益竒之餽之以蒸猪頭食之甚美公喜問僧止能飲酒食肉耶為有他技也僧自言能為詩公令賦食蒸豚詩操筆立成曰觜長毛短淺含臕久向山中食藥苖蒸處已將蕉葉裹熟時兼用杏漿澆紅鮮雅稱金盤薦軟熟真堪玉筯挑共把羶根來比並羶根只合喫藤條公大喜與紫衣師號東坡元祐初見公之𤣥孫訥夜話及此為記之王平甫夢至靈芝宫王平甫熙寧癸丑嵗直宿崇文館夢有人挾之至海上見海中央宫殿甚盛其中作樂笙簫鼓吹之伎甚衆題其宫曰靈芝宫平甫欲與俱往有人在宫側謂曰時未至且令去他日當迎之至此恍然夢覺時禁中已鐘鳴平甫頗自負不凡為詩記之曰萬頃波濤木葉飛笙歌宫殿號靈芝揮毫不似人間世長樂鐘來夢覺時安世髙請福䢼亭廟秦少游宿此夢天女求贊安世髙者安息國王之嫡子也為沙門漢桓帝建和初至長安靈帝末關中大亂謂人曰我有道伴在江南當往省之人曰遊宦乎沙門乎曰以嗔故為神然吾亦往廣州償債耳世髙舟次廬山宫亭湖廟下廟甚靈能分風送往來之舟世髙舟人捧牲請福神輒降曰舟有沙門乃不俱來耶世髙聞之為至廟下神復語曰我果以多嗔至此業今家此湖千里皆所轄以雖嗔而好施故多寶玩以縑千匹黃白物付君為建佛寺為冥福今洪州大安寺是也秦少游南遷宿廟下登岸縱望久之歸卧舟中聞風聲側枕視微波月影縱橫追繹昔常宿雲老惜竹軒見西湖月色如此遂夢美人自言維摩詰散花天女也以維摩詰像來求贊少游愛其畫默念曰非道子不能作此天女以詩戲少游曰不知水宿分風浦何似秋眠惜竹軒聞道詩詞妙天下廬山對眼可無言少游夢中題其像曰竺儀華夢瘴面囚首口雖不言十分似九天笑覆大千作獅子吼不如博取妙喜如陶家手豫過雷州天寧與戒禪夜話問少游字畫戒出此傳為示少游筆蹟也冷齊夜話卷二
