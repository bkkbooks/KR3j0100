body:
  text: 冷齋夜話卷十宋釋惠洪撰作詩準食肉例陳瑩中謫通州夜讀洛浦録乃大有所悟斂目長息曰此句唯覺範可解然渠在海外吾無定光佛手何能招之又曰吾甥李郁光祖者覺範所愛當呼來授以此句覺範倘有生還之幸而吾以去死不逺恐隔生則託光祖授之如太陽直掇付逺録公耳于是光祖自邵武跰足至通瑩中熟視彌月曰非寄附所可姑置之明年豫還自朱崖館于高安大愚瑩中自台州載其家來漳浦過九江廬山因家焉督豫兼程來豫以三日至湓城瑩中曰自此公可禁作詩無益于事豫曰敬奉教然豫兒時好食肉母使持齋豫叩頭乞先飫食肉一日母許之今亦當準食肉例先吟兩詩喜吾二人死而復生如何瑩中許之豫詩曰雁蕩天台看得足盡搬兒女寄篷窗徑來漳水謀二頃偶愛廬山家九江名節逼真如醉白生涯領略似襄龎向來萬事都休理且聽樓鐘一夜撞與公靈鷲曾聽法遊戲人間知幾生夏口甕中藏畫像孤山月下認歌聲翳消已覺華無蒂礦盡方知珠自明數抹夕陽殘雨外一番飛絮滿江城瑩中喜而謂曰此詩如岐下豬肉也雖美無多食後三年豫客漳水見瑩中姪勝柔自九江來出詩示豫曰仁者雖逢思有常平居慎勿示何妨爭先世路機關惡近後語言滋味長可口物多終作疾快心事過必為傷與其病後求良藥不若病前能自防豫謂勝柔曰公癡叔詩如食鰣魚唯恐遭骨刺耳與岐下豬肉不可同日而語也蠧文不通辨譯景祐中光梵大師惟淨以梵學著聞天下皇祐中大覺禪師懷璉以禪宗大振京師淨居傳法院璉居淨因院一時學者依以揚聲景靈宫鋸傭解木木既分有蟲鏤紋數十字如梵書字旁行因進之上遣都知羅宗譯經潤文夏英公竦詣傳法院𨗳譯冀得祥異之語以讖國淨焚香𨗳譯逾刻乃曰天竺無此字不通辨譯右璫恚曰諸大師且領上意若稍成譯館恩例不淺而英公以此意諷之淨曰幸若蠧紋稍可箋辨誠教門光也異日彰謬妄萬死何補上又嘗賜璉以龍腦鉢盂璉對使者焚之曰吾法以壞色衣以瓦鉢食此鉢非法使者歸奏上佳歎之淨璉輩何可少富鄭公每語客此兩道人可謂佛弟子也倘使立朝必能盡忠以其人品不凡故隨所寓輒盡其才今則淨璉輩何其少也耶石崖僧豫遊褒禪山石崖下見一僧以紙軸枕首跣足而卧豫坐其旁久之乃驚覺起相向熟視豫曰方聽萬壑松聲泠然而夢夢見歐陽公羽衣折角巾杖藜逍遙潁水之上豫問師嘗識公乎曰識之豫私自語曰此道人識歐公必不凡乃問曰師寄此山如今幾年矣道具何在伴侣為誰僧笑曰出家欲無纍公所言衮衮多事人也曰豈不置鉢耶曰食時寺有碗又曰豈不畜經卷耶曰藏中自備足曰豈不備笠耶曰雨即吾不行曰鞋履亦不用耶曰昔有之今弊棄之跣足行殊快人豫愕曰然則手中紙軸復何用曰此吾度牒也亦欲睡枕頭豫甚愛其風韻恨不告我以名字鄉里然識其吳音也必湖山隱者南還海岱逢佛印禪師元公出山重荷者百夫擁輿者十許夫巷陌聚觀喧吠雞犬豫自歎曰使褒禪山石崖僧見之則子為無事人耶三生為比丘唐忠義傳李澄之子源自以父死王難不仕隱洛陽惠林寺年八十餘與道人圓觀遊甚密老而約自峽路入蜀源曰豫久不入繁華之域于是許之觀見錦襠女子浣泣曰所以不欲自此來者以此女也然業影不可逃明年某日君自蜀還可相臨以一笑為信吾已三生為比丘居湘西嶽麓寺寺有巨石林間嘗習禪其上遂不復言已而觀死明年如期至錦襠家則兒生始三日源抱臨明簷兒果一笑却後十二年至錢塘孤山月下聞扣牛角而歌者曰三生石上舊精魂賞月吟風不要論慚愧情人逺相訪此身雖壞性常存東坡刪削其傳而曰圓澤而不書嶽麓三生石上事贊寧所録為圓觀東坡何以書為澤必有據見叔黨當問之禪師知羊肉毗陵承天珍禪師蜀人也巴音夷面真率不事事郡守忘其名初至不知其佳士未嘗與語偶攜客來遊珍亦坐于旁守謂客曰魚稻宜江淮羊麵宜京洛客未及對珍輒對曰世味無如羊肉大美且性極暖宜人食守色變瞋視之徐曰禪師何故知羊肉性暖珍應曰常卧氊知之其毛尚爾暖其肉不言可知矣如明公治郡政美則立朝當更佳也日延一僧對飯趙閲道休官歸三衢作髙齋而居之禪誦精嚴如老爛頭陀與鍾山佛慧禪師為方外友唱酬妙語照映叢林性喜食素日須延一僧對飯可以想見其為人矣邪言罪惡之由法雲秀關西鐵面嚴冷能以理折人魯直名重天下詩詞一出人爭傳之師嘗謂魯直曰詩多作無害艷歌小詞可罷之魯直笑曰空中語耳非殺非偷終不至坐此墮惡道師曰若以邪言蕩人淫心使彼逾禮越禁為罪惡之由吾恐非止墮惡道而已魯直頷之自是不復作詞曲三君子瑕疵可笑徐師川曰豫于東坡山谷瑩中三君子俱知敬畏者也然其瑕疵豫能笑之如東坡議論諫諍真所謂殺身成仁者其視死生如旦夜爾安能為哉而欲學長生不死山谷赴官姑孰既至未視事聞當罷不去竟俯就之七日符至乃去問其故曰不爾無舟吏可遷夫士之進退大體欲分明不可茍也豈以舟吏為纍耶瑩中大節昭著其能必行其志者視爵祿如糞土然猶時對日者説命此皆顛倒也吾故笑之歐陽修何如人臨川謝逸字無逸高才江南勝士也魯直見其詩歎曰使在館閣當不減朝張朱世英為撫州舉入行不就間居多從衲子遊不喜對書生一日有一貢士來謁坐定曰每欲問無逸一事輒忘之嘗聞人言歐陽修果何如人無逸熟視久之曰舊亦一書生後甚顯逹嘗參大政又問能文章否無逸曰也得無逸之子宗野方七嵗立于旁聞之匿笑而去證道歌宣公塔大通禪師言吾頃過南都謁張安道於私第道話一夕安道曰景德初西土有異僧到都下閲永嘉證道歌即作禮頂戴久之譯者問其故僧曰此書流播五天稱真丹聖者所説經發明心要者甚多又問大律師宣公塔所在吾欲往禮謁譯者又問此方大士甚衆何獨求宣公哉曰此師持律名重五天寧安不視秀僧書洪州武寧安和尚者天衣懷禪師之嗣也與秀關西為同行秀已應詔住法雲寺其威光可以挾其友登雲天而翔也而安止荒村破院單丁五十年秀時以書致安安未嘗視棄之侍者不解其意因間問之安曰吾始以秀有精彩乃今知其癡夫出家兒冢間樹下辦那事如救頭然無故于八逹衢頭架大屋養數百間漢此真開眼尿牀也何足復對語哉吾宗自此蓋亦微矣子曹猶當見之饌器皆黃白物王荆公居鍾山時與金華俞秀老過故人家飲飲罷少坐水亭顧水際沙間有饌器數件皆黃白物意吏卒竊之故使人問司之者乃小兒適聚于此食棗栗食盡棄之而去荆公謂秀老曰士欲任大事閲富貴如羣兒作息乃可耳聖人多生儒佛中朱世英言豫昔從文公定林數夕聞所未聞嘗曰子曾讀遊俠傳否移此心學無上菩提孰能禦哉又曰成周三代之際聖人多生儒中兩漢以下聖人多生佛中此不易之論也又曰吾止以雪峰一句語作宰相世英曰願聞雪峰之語公曰這老子嘗為衆生自是什麼有縫浮屠石塔長老戒公東坡居士昔赴登文戒公迓之東坡曰吾欲一見石塔以行速不及也戒公起曰這著是磚浮屠耶坡曰有縫奈何曰若無縫爭容得世間螻蟻坡首肯之麥舟助喪范文正公在睢陽遣堯夫于姑蘇取麥五百斛堯夫時尚少既還舟次丹陽見石曼卿問寄此久近曼卿曰兩月矣三喪在淺土欲舉之西北歸無可與謀者堯夫以所載舟付之單騎自長蘆捷徑而去到家拜起侍立良久文正曰東吳見故舊乎曰曼卿為三喪未舉留滯丹陽時無郭元振莫可告者文正曰何不以麥舟付之堯夫曰已付之矣讀傳燈録東坡夜宿曹溪讀傳燈録燈花墮卷上燒一僧字即以筆記于窗間曰山堂夜岑寂燈下讀傳燈不覺燈花落茶毗一箇僧梵志詩曰城外土饅頭饀草在城裏一人喫一箇莫嫌沒滋味魯直曰既是饀草何緣更知滋味易之曰顯兒以酒澆且圖有滋味詩當作不經人語盛學士次仲孔舍人平仲同在館中雪夜論詩平仲曰當作不經人道語曰斜拖闕角龍千丈淡抹牆腰月半稜坐客皆稱絶次仲曰句甚佳惜其未大乃曰看來天地不知夜飛入園林總是春平仲乃服其工嶺外梅花嶺外梅花與中國異其花幾類桃花之色而唇紅香著東坡詞曰玉質那愁瘴霧氷姿自有仙風海仙時遣探芳叢倒挂緑毛么鳯素面常嫌粉涴洗妝不褪唇紅髙情已逐曉雲空不與梨花同夢魯直詞曰天涯也得江南信梅破知春近夜闌風細得香遲不道曉來開遍向南枝玉簫弄粉人應妬飄到眉心住平生箇裏傾杯深去國十年老盡少年心詩忌深刻黃魯直使余對句曰呵鏡雲遮月對曰啼妝露著花魯直罪余于詩深刻見骨不務含蓄余竟不曉此論當有知之者耳蔡元度生殁髙郵蔡元度焚黃餘杭舟次泗州病亟僧伽塔吐光射其舟萬人瞻仰中有棺呈露士大夫知元度不起矣至髙郵而殁元度生于髙郵而殁于此亦異耳世言元度蓋僧伽侍者木義之後身初以為誕今乃信然冷齋夜話卷十
