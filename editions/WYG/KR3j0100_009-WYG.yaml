body:
  text: 冷齋夜話卷九宋釋惠洪撰草書亦自不識張丞相好草書而不工當時流輩皆譏笑之丞相自若也一日得句索筆疾書滿紙龍蛇飛動使姪録之當波險處姪罔然而止執所書問曰此何字也丞相熟視久之亦自不識詬其姪曰胡不早問致予忘之當出汝詩示人沈東陽野史曰晉桓温少與殷浩友善殷嘗作詩示温温玩侮之曰汝慎勿犯我犯我當出汝詩示人昌州海棠獨香李舟大夫客都下一年無差遣乃受昌州議者以去家逺乃改受鄂倅淵材聞之吐飯大歩往謁李曰今日聞大夫欲受鄂倅有之乎李曰然淵材悵然曰誰為大夫謀昌佳郡也奈何棄之李驚曰供給豐乎曰非也民訟簡乎曰非也然則何以知其佳淵材曰天下海棠無香昌州海棠獨香非佳郡乎聞者傳以為笑劉淵材迂濶好怪淵材迂濶好怪嘗畜兩鶴客至指以誇曰此仙禽也凡禽卵生而此胎生語未卒園丁報曰此鶴夜産一卵大如梨淵材面發赤訶曰敢謗鶴也卒去鶴輒兩展其脛伏地淵材訝之以杖驚使起忽誕一卵淵材嗟咨曰鶴亦敗道吾乃為劉禹錫佳話所誤自今除佛老子孔子之語予皆勘驗予曰淵材自信之力然讀相鶴經未熟耳又嘗曰吾平生無所恨所恨者五事耳人問其故淵材歛目不言久之曰吾論不入時聽恐汝曹輕易之問者力請説乃答曰第一恨鰣魚多骨第二恨金橘太酸第三恨蓴菜性冷第四恨海棠無香第五恨曾子固不能作詩聞者大笑而淵材瞠目曰諸子果輕易吾論也課術有騐無騐靈源禅師住龍舒太平精舍有日者能課使之課莫不竒中蘇朝奉者至寺使課無驗非特為蘇課無驗凡為逹官要人言皆無驗至為市井凡庸山林之士課則如目見而言靈源問其故答曰我無徳量凡見尋常人則據術而言無所縁飾見貴人則畏怖往往置術之實而務為諛詞其不驗要不足怪郭注妻未及門而死韓魏公客郭注者才而美然求室則病行年五十未有室家魏公憐之百計賙恤為求婚將遂其人必死公以侍兒賜之未及門而注死郭注殆可與范公客同科也韓范功名富貴如太山黃河日月所不能老兩客乃爾可笑耶癡人説夢夢中説夢僧伽龍朔中遊江淮間其迹甚異有問之曰汝何姓答曰姓何又問何國人答曰何國人唐李邕作碑不曉其言乃書傳曰大師姓何何國人此正所謂對癡人説夢耳李邕遂以夢為真真癡絶也僧賛寧以其傳編入僧史又從而解之曰其言姓何亦猶康會本康居國人便命為康僧會詳何國在碎葉東北是碎葉國附庸耳此又夢中説夢可掩卷一笑不欺神明徐鉉曰江南處士朱真每語人曰世皆云不欺神明此非天地百神但不欺心即不欺神明也予聞司馬温公曰我平居無大過人但未嘗有不可對人言者耳此不欺神明也聞逺方不死之術孔叢子有言昔有人聞逺方能不死之術者裹糧往從之及至而其人已死矣然猶歎恨不得聞其道予愛其事有中禅者之病佛法浸逺真偽相半唯死生禍福之際不容偽耳今目識其偽猶惑之可笑也自以宗教為己任髙仲靈作逺公影堂記六件事且罪學者不能深考逺行事以張大其徳著明於世予曰仲靈寧嘗自考其事乎謝靈運欲入社逺拒之曰是子思亂將不令終盧循反而逺與之執手言笑謂逺知人則何暗于循謂不知人則何獨明于靈運逺自以宗教為己任而授詩禮于宗雷輩與道安諫苻堅勿伐洛陽同科父子于釋氏其可為純正而知大體者耶牛逐虎筠溪快山有虎嘗搏牧牛童子為兩牛所逐虎既去牛捍䕶之童子竟死石門老衲文公為予言之為作詩記之以諷含齒被髮而不義者然予徒能諷之其能已之哉快山山淺亦有虎時時妥尾過行路一豎坐地牧兩牯以捶捶地不復顧虎摶豎如鷹搦兎兩牛來奔虎棄去因往荷痒挨老樹牯則喘視同守䕶虎竟不能得此豎豎雖不救牯無負一村囂然共鳴鼓而虎已逃不知處嗟哉異哉兩大武髙義可與貫髙伍今走仁義名好古臨事真情乃愧汝此事可信文公語為君落筆敏風雨劉野夫免徳莊火災龔徳莊罷官河朔居京師新門劉野夫上元夕以書約徳莊曰今夜欲與君語令閤必盡室出觀燈當清浄身心相候徳莊雅敬其為人危坐三鼓矣家人輩未還野夫亦竟不至俄火自門而燒徳莊窘持誥牒犯烈焰而出頃刻數百舍為瓦礫之塲明日野夫來弔且欣曰令閤已不出是吾憂幸出可賀也徳莊心異野夫然不欲詰之也三十六計走為上計紹聖初曾子宣在西府淵材往謁之論邊事極言官軍不可用用士為良子宣喜之既罷與余過興國寺河上食素分茶甚美將畢問奴楊照取錢奴曰忘持錢來奈何淵材色窘予戲曰兵計將安出淵材以手捋鬚良久目予趨自後門出若將便旋然予追逐淵材以手拏帽褰衣走如飛予與奴楊照追逐二相公廟淵材乃敢回顧喘立面無人色曰鞭虎頭撩虎鬚幾不免于虎口哉予又戲曰在兵法何如淵材曰三十六計走為上計冷齋夜話卷九
