body:
  text: 冷齋夜話卷一宋釋惠洪撰江神嗜黃魯直書韋詩王榮老嘗官于觀州欲渡觀江七日風作不得濟父老曰公篋中必蓄寳物此江神極靈當獻之得濟榮老顧無所有惟玉麈尾即以獻之風如故又以端硯獻之風愈作又以宣包虎帳獻之皆不驗夜卧念曰有黃魯直草書扇頭題韋應物詩曰獨憐幽草澗邊生上有黃鸝深樹鳴春潮帶雨晚來急野渡無人舟自橫即取視之戃恍之際曰我猶不識鬼寧識之乎持以獻之香火未收天水相照如兩鏡展對南風徐來張帆一餉而濟予觀江神必元祐遷客之鬼不然何嗜之深邪秦少游作東坡筆語題壁東坡初未識秦少游少游知其將復過維揚作坡筆語題壁于一山中寺東坡果不能辨大驚及見孫莘老出少游詩詞數百篇讀之乃嘆曰向書壁者豈此郎邪羅漢第五尊失隊予往臨川景徳寺與謝無逸輩升閣得禪月所畫十八應真像甚竒而失第五軸予口占嘲之曰十八應真解脫根少叢羅漢亂山門不知何處進齋去未見雲堂第五尊明日有女子來拜叙曰兒南營兵妻也寡而食素夜夢一僧來言曰我本景徳僧因行失隊煩相引歸寺可乎既覺而隣家要飯入其門壁間有畫僧形狀了然夢所見也時朱世英守臨川異之使迎還為閤藏之予方少年時羅漢且畏予嘲及其老也如梵吉者亦見侮可怪也東坡夢銘紅靴東坡倅錢塘日夢神宗召入禁宫女環侍一紅衣女捧紅靴一雙命軾銘之覺而記其中一聮云寒女之絲銖積寸累天歩所臨雲蒸雷起既畢進御上極嘆其敏使宫女送出睇視裙帶間有六言詩一首曰百疊漪漪水皺六銖縰縰雲輕植立含風廣殿微聞環珮揺聲詩出本處東坡作海棠詩曰只恐夜深花睡去髙燒銀燭照紅粧事見太真外傳曰上皇登沈香亭詔太真妃子妃子時卯醉未醒命力士從侍兒扶掖而至妃子醉顔殘粧鬢亂釵橫不能再拜上皇笑曰豈是妃子醉真海棠睡未足耳作尼童詩曰應將白練作仙衣不許紅膏汙天質事見則天長壽二年詔書曰應天下尼當用細白練為衣作橄欖詩曰待得微甘囘齒頰已輸崖蜜十分甜事見鬼谷子曰照夜青螢也百花醲蜜也崖蜜櫻桃也作贈舉子詩曰平生萬事足所欠惟一死事見梁僧史曰世祖宴東府王公畢集詔䟦陀羅至䟦陀羅皤然清痩世祖望見謂謝莊曰摩訶衍有機辯當戲之䟦陀趨外陛世祖曰摩訶衍不負逺來惟有一死在即應聲曰貧道客食陛下三十載恩徳厚矣無所欠所欠者惟一死耳李太白詩曰昔作芙蓉花今為㫁腸草以色事他人能得幾時好陶𢎞景仙方注曰㫁腸草不可食其花美好名芙蓉花宋神宗詔禁中不得牧豭豘因悟太祖逺略陳瑩中為予言神宗皇帝一日行後苑見牧猳㹠者問何所用牧者對曰自祖宗以來長令畜之自稚養以至大則殺之又養稚者前朝不敢易亦不知果安用神宗沈思久之詔付所司禁中自今不得復畜數月衛士忽獲妖人急欲血澆之禁中卒不能致神宗方悟太祖逺略亦及此東坡南遷朝雲隨侍作詩以佳之東坡南遷侍兒王朝雲者請從行東坡佳之作詩有序曰世謂樂天有鬻駱馬放楊枝詞佳其至老病不忍去也然夢得詩曰春盡絮飛留不得隨風好去落誰家樂天亦云病與樂天相伴住春同樊素一時歸則是樊素竟去也予家有數妾四五年相繼辭去獨朝雲隨予南遷因讀樂天詩戲作此贈之云不學楊枝别樂天且同通徳伴伶𤣥伯仁絡秀不同老天女維摩縂解禅經卷藥爐新活計舞裙歌板舊因縁丹成隨我三山去不作巫陽雲雨仙盖紹聖元年十一月也三年七月十五日朝雲卒葬于栖禅寺松林中直大聖塔又和詩曰苖而不秀豈其天不使童烏與我𤣥駐景恨無千嵗藥贈行惟有小乗禅傷心一念償前債弹指三生斷後縁歸卧竹根無逺近夜燈懃禮塔中仙又作梅花詞曰玉骨那愁瘴霧者其寓意為朝雲作也秦少游曰唐詩閨怨詞曰繡閤開金鎖銀臺㸃夜燈長征君自慣獨卧妾何曾此正語病之著者而選詩自謂精之果精乎參寥子曰林下人好言詩纔見誦貫休齊已詩便不必問東坡書壁前輩訪人不遇皆不書壁東坡作行不肯書牌其特地止書壁耳候人未至則掃墨竹古人貴識其真東坡每曰古人所貴者貴其真陶淵明耻為五斗米屈于鄉里小兒棄官去歸久之復遊城郭偶有羡于華軒漢髙帝臨大事鑄印銷印甚于兒戲然其正直明白照映千古想見其為人問士大夫蕭何何以知韓信竟未有答之者東坡得陶淵明之遺意東坡嘗曰淵明詩初看若散緩熟看有竒句如日暮巾柴車路暗光已夕歸人望烟火稚子候簷隙又曰採菊東籬下悠然見南山又靄靄逺人村依依墟里烟犬吠深巷中鷄鳴桑樹顚大率才髙意逺則所寓得其妙造語精到之至遂能如此似大匠運斤不見斧鑿之痕不知者困疲精力至死不之悟而俗人亦謂之佳如曰一千里色中秋月十萬軍聲半夜潮又曰蝴蝶夢中家萬里子規枝上月三更又曰深秋簾幕千家雨落日樓臺一笛風皆如寒乞相一覽便盡初如秀整熟視無神氣以其字露也東坡作對則不然如曰山中老宿依然在案上楞嚴已不看之類更無齟齬之態細味對甚的而字不露此其得淵明之遺意耳鳯翔壁上題詩東坡曰予少官鳯翔行山求邸見壁間有詩曰人間無漏仙兀兀三盃醉世上沒眼禅昏昏一覺睡雖然沒交渉其奈略相似相似尚如此何况真箇是故其海上作濁醪有妙理賦曰嘗因既醉之適方識人心之正然此老言人心之正如孟子言性善何以異哉盧橘東坡詩曰客來茶罷空無有盧橘微黃尚帶酸張嘉甫曰盧橘何種果類荅曰枇杷是矣又問何以驗之答曰事見相如賦嘉甫曰盧橘夏熟黃甘橙榛枇杷橪柿亭奈厚朴盧橘果枇杷則賦不應四句重用應劭注曰伊尹書曰箕山之東青鳥之所有盧橘常夏熟不據依之何也東坡笑曰意不欲耳東坡論文與可詩東坡嘗對歐公誦文與可詩曰美人却扇坐羞落庭下花歐公笑曰與可無此句與可拾得耳世徒知與可掃墨竹不知其髙才兼諸家之妙詩尤精絶戲作鷺鷥詩曰頸細銀鈎淺曲脚髙緑玉深翹岸上水禽無數有誰似汝風標的對東坡曰世間之物未有無對者皆自然生成之象雖文字之語但學者不思耳如因事當時為之語曰劉蕡下第我輩登科則其前有雍齒且侯吾屬何患太宗曰我見魏徵常嫵媚則徳宗乃曰人言盧把是姦邪東坡留題姜唐佐扇楊道士息軒姜秀郎几間東坡在儋耳有姜唐佐從乞詩唐佐朱崖人亦書生東坡借其手中扇大書其上曰滄海何曾斷地脉朱崖從此破天荒又書司命宫楊道士息軒曰無事此静坐一日是兩日若活七十年便是百四十黃金不可成白髮日夜出開眼三十秋速於駒過隙是故東坡老貴汝一念息時來登此軒望見過海席家山歸未得題詩寄屋壁有蠻女揷茉莉嚼㯽榔戲書姜秀郎几間曰暗麝著人簮茉莉紅潮登頰醉㯽榔其放如此換骨奪胎法山谷云詩意無窮而人之才有限以有限之才追無窮之意雖淵明少陵不得工也然不易其意而造其語謂之換骨法窺入其意而形容之謂之奪胎法如鄭谷十月菊曰自縁今日人心别未必秋香一夜衰此意甚佳而病在氣不長西漢文章雄深雅健者其氣長故也曾子固曰詩當使人一覽語盡而意有餘乃古人用心處所以荆公菊詩曰千花萬卉彫零後始見閒人把一枝東坡則曰萬事到頭終是夢休休休明日黃花蝶也愁又如李翰林詩曰鳥飛不盡暮天碧又曰青天盡處沒孤鴻然其病如前所論山谷作登達觀臺詩曰瘦藤拄到風煙上乞與遊人眼界開不知眼界濶多少白鳥去盡青天回凡此之類皆換骨法也顧況詩曰一别二十年人堪幾回别其詩簡㧞而立意精確舒王作與故人詩云一日君家把酒盃六年波浪與塵埃不知烏石岡邊路到老相逢得幾回樂天詩曰臨風杪秋樹對酒長年身醉貌如霜葉雖紅不是春東坡南中作詩云兒童悞喜朱顔在一笑那知是醉紅凡此之類皆奪胎法也學者不可不知詩用方言詩人多用方言南人謂象牙為白暗犀為黒暗故老杜詩曰黒暗通蠻貨又謂睡美為黒甜飲酒為軟飽故東坡詩曰三杯軟飽後一枕黒甜餘老嫗解詩白樂天每作詩令一老嫗解之問曰解否嫗曰解則録之不解則易之故唐末之詩近于鄙俚采石渡鬼歐陽文忠公慶厯末宿采石舟人甫睡潮至月黒公方就寢微聞呼聲曰去未舟尾有答者曰有叅政船宿此不可擅去齋料幸為攜至五鼓岸上獵獵馳驟聲舟尾者呼曰齋料幸見還有且行且答者曰道場不清浄無所得公異之後遊金山與長老瑞新語新曰某夜建水陸有施主攜室至忽乳一子俄覺腥風滅燭大衆恐使人問其時公宿采石之夜其後蔡州求退之鋭者亦其前知然耶時公自叅知政事除蔡州黃魯直熈寧初宿石塘寺寺有鬼靈異僧敬信之一夕夢曰分寧黃刑部至僧曰侍郎乎尚書乎曰侍郎也魯直南遷已六十親故憂其禍大又南方瘴霧非菜肚老人所宜魯直笑曰宜州者所以宜人也且石塘鬼侍郎之言豈欺我哉魯直竟歿于宜州較采石之鬼何愚智相去三十里豈魯直癡絶故欺之耶李後主亡國偈宋太祖將問罪江南李後主用謀臣計欲拒王師法眼禅師觀牡丹于大内因作偈諷之曰擁毳對芳叢由來趣不同髮從今日白花似去年紅艶曵隨朝露馨香逐晚風何須待零落然後始知空後主不省王師旋渡江冷齋夜話卷一
