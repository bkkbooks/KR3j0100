body:
  text: 冷齋夜話雜家類三雜説之屬提要臣等謹案冷齋夜話十卷宋僧恵洪撰恵洪一名徳洪字覺範筠州人大觀中游丞相張商英之門商英敗恵洪亦坐累謫朱厓是書晁公武讀書志作十卷與今本相合然陳善捫蝨新話謂山谷西江月詞日側金盤墜影一首為恵洪贋作載於冷齋夜話又引宋百家詩選云冷齋夜話中偽作山谷贈洪詩韻勝不減秦少覿氣爽絶類徐師川云云今本無此兩篇盖已經後人刪削非其完本又每篇皆有標題而標題或冗呇過甚或拙鄙不文皆與本書不類其最刺謬者如洪駒父詩話一條乃引洪駒父之言以正俗刻之誤非攻洪駒父之誤也其標題乃云洪駒父評詩之誤顯相背觸又䢼亭湖廟一條捧牲請福者乃安世髙之舟人故神云舟有沙門乃不俱來耶非世髙自請福也又追敘漢時建寺乃為秦觀作維摩賛縁起非記世髙事也其標題乃云安世髙請福䢼亭廟秦少游宿此夢天女求賛既乖本事且不成文又蘇軾寄鄧道士詩一條用韋應物寄全椒山中道士詩韻乃記蘇詩非記韋詩也而其標題乃云韋蘇州寄全椒道人詩更全然不解文義又恵洪本彭氏子於彭淵材為叔侄故書中但稱淵材不系以姓而其標題乃皆改為劉淵材尤為不考此類不可殫數亦皆後人所妄加非所本有也是書雜記見聞而論詩者居十之八論詩之中稱引元祐諸人者又十之八而黄庭堅語尤多盖恵洪猶及識庭堅故引以為重其庭堅夢逰蓬萊一條山谷集題曰記夢洪駒父詩話曰余嘗問山谷云此記一段事也嘗從一貴宗室擕妓游僧寺酒䦨諸妓皆散入僧房中主人不怪也故有曉然夢之非紛紜句恵洪乃稱庭堅曽與共宿湘江舟中親話有夢與道士游蓬萊事且云今山谷集語不同盖後更易之是殆竄亂其說使故與本集不合以自明其暱於庭堅獨知其詳耳晁公武詆此書多誕妄偽托者即此類歟然恵洪本工詩其詩論實多中理解所言可取則取之其託於聞之某某置而不論可矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
