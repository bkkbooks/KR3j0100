body:
  text: 冷齋夜話卷八宋釋惠洪撰劉跛子説二范詩劉跛子青州人拄一拐每嵗必一至洛中看花館范家園春盡即還京師為人談噱有味范家子弟多狎戲之有范老見之即與之二十四金曰跛子喫碗羮于是以詩謝伯仲曰大范見時二十四小范見時喫碗羮人生四海皆兄弟酒肉林中過一生陳瑩中贈跛子長短句初張丞相召自荆湖跛子與客飲市橋客聞車馬過甚都起觀之跛子挽其衣使且飲作詩曰遷客湖湘召赴京車蹄迎迓一何榮争如與子市橋飲且免人間寵辱驚陳瑩中甚愛之作長短句贈之其略曰槁木形骸浮雲身世一年兩到京華又還乗興閒看洛陽花説甚姚黃魏紫春歸後終委泥沙忘言處花開花謝都不似我生涯云云予政和改元見于興國寺以詩戲之曰相逢一拐大梁間妙語時時見一斑我欲從公蓬島去爛銀堆裏見青山予姻家許中復大夫宜人趙叅政槩之孫女云我十許嵗時見劉跛子來覓酒喫笑語終日而去計其壽百四十五年許嘗館于京師新門張婆店三十年日坐相國寺東廊邸中人無有識之者野夫長短句劉野夫留南京久未入都淵材以書督之野夫答書曰跛子一生别無路展手教化三饑兩飽回視雲漢聊以自誑元神新來被劉法師徐神翁形迹得不成模様深欲上京相覷又恐撞着文人泥沱佛驀地被乾拳濕踢着甚來由其不覊如此嘗自作長短句曰跛子年年形容何似儼然一部髭鬚世上詩大拐上有工夫逹南州北縣逢着處酒滿葫蘆醺醺醉不知來日何處度朝晡洛陽花看了歸來帝里一事全無若還與匏羮不託依舊再作門徒驀地思量下水輕船上蘆席橫鋪呵呵笑睢陽門外有箇好西湖劉淵材南歸布槖淵材游京師貴人之門十餘年貴人皆前席其家在筠之新昌其貧至饘粥不給父以書召其歸曰汝到家吾倒懸解矣淵材于是南歸跨一驢以一黥挾以布槖槖黥皆斜絆其腋一邑聚觀親舊相慶三日議曰布槖中必金珠也予雅知其迂濶疑之乃問親舊聞淵材還相慶曰君官爵雖未入手必使父母妻兒脱凍餒之厄槖中所有可早出以觀之淵材喜見眉鬚曰吾富可敵國也汝可拭目以觀乃開槖有李廷珪墨一丸文與可竹一枝歐公五代史草藁一巨編餘無所有雲庵活盲女雲庵住洞山時嘗過檀越家經大林間少立聞哀聲雜流水臨澗下窺有蹲水中者使兩夫下扶猿臂而上乃盲女子年十七八許問其故曰我母死父傭于逺方兄貧無食牽我至此猛推下我而去雲庵意惻不自知涕下顧其人力曰汝無婦可畜以相活我給與一世力拜諾即以所乗筍兜舁歸山雲庵歩隨之盲女後生三子皆勤院事雲庵雖領衆他山嵗時遣人給衣食如子姪然雲庵髙世之行若此之類甚衆錢如蜜仲殊初游呉中自負一盖見賣餳者從乞一錢餳與之即就買餳食之而去嘗客館古寺中道俗造之輒就覓錢皆相顧羞縮曰初不多辦來奈何殊曰錢如蜜一滴也甜道士畜三物萬安軍南並海石崖中有道士年八九十嵗自言本交趾人渡海船壊于此崖因庵焉養一雞大如倒挂日置枕中啼即夢覺又畜王孫小于蝦蟆風度清癯以線繫几案間道士喚則跳躑登几唇危坐分殘顆而食之又有龜狀如錢置合中時掲其盖使出戲衣袖間予謁之示此三物從予乞詩予熟視曰公小人國中引道者吾詩俚詎能摹冩髙韻夢遊蓬萊黃魯直元祐中晝卧蒲池寺時新秋雨過涼甚夢與一道士褰衣升空而去望見雲濤際天夢中問道士無舟不可濟且公安之道士曰與公遊蓬萊即襪而履水魯直意欲無行道士强要之俄覺大風吹鬢毛骨為戦慄道士曰且歛目唯聞足底聲如萬壑松風有狗吠開目不見道士唯見宫殿張開千門萬户魯直徐入有兩玉人𨗳升殿主者降接之見仙官執玉麈尾仙女擁侍之中有一女方整琵琶魯直極愛其風韻顧之忘揖主者主者色莊故其詩曰試問琵琶可聞否靈君色莊伎揺手頃與予同宿湘江舟中親為言之與今山谷集語不同盖後更易之耳周貫吟詩作偈周貫者不知何許人雅自號木鴈子治平熈寧間往來西山時時至髙安與予大父善日酣飲畜一大瓢行旅夜以為溺器工作詩詩成癖嘗宿奉新龍泉觀半夜搥門道士驚科髮披衣啓問其故貫笑曰偶得句當奉道士殊不意已問之因使口誦貫以手指畫吟曰弹琴傷指甲盖席損髭鬚是夜貫寒甚以席自覆故爾又至袁州見市井李生者有秀韻欲攜以同歸林下而李嗜酒色意欲無行貫指畫藥鐺作偈示之曰頑鈍天教合作鐺縱生三脚豈能行雖然有耳不聽法只愛人間戀火坑尋死于西山方將化人問其幾何嵗貫曰八十西山作酒仙麻鞋軋斷布衣穿相逢甲子君休問太極光陰不計年後有人見于京師橋付書與袁州李生云我明年中秋夕時當上謁也至時果造李生生時以事出乃以白土大書其門而去曰今年中秋夕來赴去年約不見破鐵鐺弹指空剥剥李生後竟墮馬折一足石學士石曼卿隠于酒謫仙之流也善戲謔嘗出報慈寺馭者失控馬驚曼卿墮地從吏驚遽扶掖據鞍市人聚觀意其必大詬怒曼卿徐着一鞭謂馭者曰賴我石學士也若瓦學士顧不破碎乎白土埭髙僧傳有神仙史宗者着麻衣加袖其上號袖衣道喜怒不常體㾾瘡日往廣陵白土埭謳歌自適夜不知歸宿處江都令檀祗召至與語詞多無畔岸索紙賦詩曰有欲若不足無欲即無憂求其清虛者帶索披麻裘浮游一世間汎若不繫舟要當畢塵累棲息老山丘檀祗異之陶潜淵明所記曰白土埭逢三異比丘此其一也有狂道借海鹽令所畜小兒登小山山有屋數椽道人三四輩相勞苦其言小兒一不解但得食一塸如熟艾有問道士者謫者何時竟答曰在徐州江北廣陵白土埭上計其謫行當竟矣問者作書授道士曰為逹之即繫小兒衣帶還海鹽令喜問曰衣中有何曰書疏耳又呼問小兒至何處小兒曰前為道士捉杖飄然去但聞足下波浪聲至山中山中人寄書與白土埭上即引衣帶示令令亦不能曉小兒詣史宗史宗大驚曰汝乃蓬萊山中來耶神仙之有無吾不能知然觀其詩句脱去畛封有超然自得之氣非尋常介夫所能作也范堯夫揖客對卧范堯夫謫居永州閉門人稀識面客苦欲見者或出則問寒暄而已僮掃榻奠枕于是揖客解帶對卧良久鼻息如雷霆客自度未可起亦熟睡睡覺常及暮而去李伯時畫馬李伯時善畫馬東坡第其筆當不減韓幹都城黃金易得而伯時馬不可得師譲之曰伯時為士大夫而以畫行已可恥也又作馬忍為之耶伯時恚曰作馬無乃例能蕩人心墮惡道乎師曰公業已習此則日夕以思其情狀求為神駿繫念不忘一日眼光落地必入馬胎無疑非惡道而何伯時大驚不覺身去坐榻曰今當何以洗其過師曰但畫觀音菩薩自是畫此像妙天下故一時公卿服師之善巧也房琯前身為永禅師東坡集中有觀宋復古畫序一首曰舊説房琯開元中宰盧氏與道士邢和璞過夏口村入廢佛寺坐古松下和璞使人鑿地得甕中所藏婁師徳與永禅師書笑謂琯曰頗憶此耶因悵然悟前生之為永禅師也故人栁子玉寳此畫盖唐本宋復古所臨者退静兩忘尹師魯謫官過大梁與一老衲語師魯曰以退静為樂衲曰孰若退静兩忘師魯頓若有所得及移鄧州時范文正守南陽師魯手書與文正别文正馳至則師魯已沐浴衣冠而坐少頃而化文正哭之甚哀師魯忽舉首曰已與公别安用復來文正驚問所以師魯笑曰死生常理也何文正不逹此又問後事曰此在公耳乃揖希文復逝俄頃又舉手謂文正曰亦無鬼亦無恐怖言訖長逝沈存中曰師魯所養至此可謂有力然尚未脱有無之見何也得非退静兩忘尚存胸中乎獨無為子楊次公曰存中識藥矣然未識藥之忌也冷齋夜話卷八
